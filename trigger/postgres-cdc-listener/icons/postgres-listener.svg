<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- PostgreSQL blue: #336791 -->
  <!-- Database cylinder top ellipse -->
  <ellipse cx="24" cy="12" rx="13" ry="4" fill="#336791" stroke="#4A80B0" stroke-width="1"/>
  <!-- Cylinder body -->
  <rect x="11" y="12" width="26" height="14" fill="#336791"/>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="24" cy="26" rx="13" ry="4" fill="#285578" stroke="#4A80B0" stroke-width="1"/>
  <!-- Shine lines -->
  <line x1="12" y1="16" x2="36" y2="16" stroke="#5A98CC" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="20" x2="36" y2="20" stroke="#5A98CC" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="24" x2="36" y2="24" stroke="#5A98CC" stroke-width="0.8" opacity="0.4"/>

  <!-- LISTEN keyword represented as ear / sound waves -->
  <!-- Ear shape outline -->
  <path d="M36,28 Q42,32 40,40 Q38,44 34,42 Q32,41 33,38" stroke="#7C4DFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M36,28 Q30,30 32,36 Q33,39 36,38" stroke="#7C4DFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- NOTIFY pulse lines coming out of db -->
  <line x1="17" y1="30" x2="17" y2="36" stroke="#7C4DFF" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="21" y1="30" x2="21" y2="39" stroke="#7C4DFF" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25" y1="30" x2="25" y2="34" stroke="#7C4DFF" stroke-width="1.4" stroke-linecap="round"/>

  <text x="22" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">PG LISTEN</text>
</svg>
