<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- MySQL dolphin-blue color: #00618A, orange accent: #F29111 -->
  <!-- Database cylinder top ellipse -->
  <ellipse cx="24" cy="12" rx="13" ry="4" fill="#00618A" stroke="#0081B4" stroke-width="1"/>
  <!-- Cylinder body -->
  <rect x="11" y="12" width="26" height="14" fill="#00618A"/>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="24" cy="26" rx="13" ry="4" fill="#005070" stroke="#0081B4" stroke-width="1"/>
  <!-- Horizontal shine lines on cylinder -->
  <line x1="12" y1="16" x2="36" y2="16" stroke="#0095CC" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="20" x2="36" y2="20" stroke="#0095CC" stroke-width="0.8" opacity="0.6"/>
  <line x1="12" y1="24" x2="36" y2="24" stroke="#0095CC" stroke-width="0.8" opacity="0.4"/>

  <!-- Binlog pulse / change indicator at right edge -->
  <polyline points="34,32 37,29 39,33 41,27 43,33" stroke="#F29111" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- CDC arrow: changes flowing out -->
  <path d="M22,28 L22,36 L30,36" stroke="#F29111" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="28,33 31,36 28,39" stroke="#F29111" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Small row change dots -->
  <circle cx="16" cy="36" r="1.5" fill="#F29111" opacity="0.8"/>
  <circle cx="16" cy="41" r="1.2" fill="#F29111" opacity="0.5"/>

  <text x="24" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">MYSQL CDC</text>
</svg>
