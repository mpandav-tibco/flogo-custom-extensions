<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- Standard background: white, rounded, light border -->
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- ── Document body (the file being analysed) ─────────────────────────── -->
  <rect x="6" y="5" width="30" height="36" rx="2.5" fill="#EEF2FA" stroke="#5C6BC0" stroke-width="1.2"/>

  <!-- Dog-ear corner fold (top-right) -->
  <polygon points="25,5 36,5 36,16 25,16" fill="#FFFFFF"/>
  <polyline points="25,5 25,16 36,16" stroke="#5C6BC0" stroke-width="1.2" fill="none"/>

  <!-- "YAML" pill label — signals the rule format -->
  <rect x="8" y="8" width="14" height="5" rx="2" fill="#7C4DFF" opacity="0.15"/>
  <text x="15" y="12.2" font-size="4" font-family="monospace" fill="#7C4DFF"
        text-anchor="middle" font-weight="bold">YAML</text>

  <!-- ── Rule rows with severity dots ───────────────────────────────────── -->

  <!-- Row 1 — ERROR (red) -->
  <circle cx="12.5" cy="21" r="3" fill="#E53935"/>
  <line x1="17.5" y1="21" x2="33" y2="21"
        stroke="#5C6BC0" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- Row 2 — WARNING (orange) -->
  <circle cx="12.5" cy="29" r="3" fill="#FB8C00"/>
  <line x1="17.5" y1="29" x2="31" y2="29"
        stroke="#5C6BC0" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- Row 3 — GOOD / PASS (green) -->
  <circle cx="12.5" cy="37" r="3" fill="#43A047"/>
  <line x1="17.5" y1="37" x2="32" y2="37"
        stroke="#5C6BC0" stroke-width="1.3" stroke-linecap="round" opacity="0.55"/>

  <!-- ── Evaluation badge — purple circle with checkmark ────────────────── -->
  <!-- Sits at the bottom-right, partially overlapping the document edge    -->
  <circle cx="40" cy="38" r="7" fill="#7C4DFF"/>
  <polyline points="36.8,38.2 39.2,41 44.2,33.8"
            stroke="#FFFFFF" stroke-width="2" fill="none"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Label ──────────────────────────────────────────────────────────── -->
  <text x="24" y="47" font-size="4.5" font-family="Arial,sans-serif"
        fill="#5A6082" text-anchor="middle">RULE ENGINE</text>

</svg>
