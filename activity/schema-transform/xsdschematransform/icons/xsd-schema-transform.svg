<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- XSD / XML document on left -->
  <rect x="4" y="8" width="16" height="20" rx="2" fill="#EEF2FA" stroke="#5C6BC0" stroke-width="1.2"/>
  <!-- XML tag lines in doc -->
  <text x="7" y="16" font-size="5.5" font-family="monospace" fill="#5C6BC0">&lt;xs</text>
  <text x="7" y="21" font-size="5.5" font-family="monospace" fill="#7C4DFF">  el</text>
  <text x="7" y="26" font-size="5.5" font-family="monospace" fill="#5C6BC0">/xs</text>
  <!-- Corner fold on document -->
  <polyline points="16,8 20,8 20,12 16,12 16,8" fill="#FFFFFF" stroke="#5C6BC0" stroke-width="1"/>

  <!-- Transform arrow -->
  <line x1="21" y1="18" x2="27" y2="18" stroke="#FF6D00" stroke-width="2" stroke-linecap="round"/>
  <polyline points="25,15 28,18 25,21" stroke="#FF6D00" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Schema tree on right -->
  <!-- Root node -->
  <circle cx="36" cy="12" r="3" fill="#7C4DFF"/>
  <!-- Child branches -->
  <line x1="36" y1="15" x2="30" y2="21" stroke="#5C6BC0" stroke-width="1.2"/>
  <line x1="36" y1="15" x2="36" y2="21" stroke="#5C6BC0" stroke-width="1.2"/>
  <line x1="36" y1="15" x2="42" y2="21" stroke="#5C6BC0" stroke-width="1.2"/>
  <circle cx="30" cy="22" r="2" fill="#5C6BC0"/>
  <circle cx="36" cy="22" r="2" fill="#5C6BC0"/>
  <circle cx="42" cy="22" r="2" fill="#5C6BC0"/>
  <!-- Grandchild -->
  <line x1="30" y1="24" x2="28" y2="29" stroke="#5C6BC0" stroke-width="1" opacity="0.7"/>
  <line x1="30" y1="24" x2="32" y2="29" stroke="#5C6BC0" stroke-width="1" opacity="0.7"/>
  <circle cx="28" cy="30" r="1.5" fill="#7C4DFF" opacity="0.8"/>
  <circle cx="32" cy="30" r="1.5" fill="#7C4DFF" opacity="0.8"/>

  <!-- Validation checkmark -->
  <circle cx="36" cy="36" r="5" fill="#FFFFFF" stroke="#2A8040" stroke-width="1.5"/>
  <polyline points="33,36 35,38 39,33" stroke="#2A8040" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="24" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">XSD TRANSFORM</text>
</svg>
