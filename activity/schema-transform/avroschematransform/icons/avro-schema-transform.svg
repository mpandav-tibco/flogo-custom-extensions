<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Avro feather shape (binary/compact format) -->
  <!-- Feather quill -->
  <path d="M36,5 Q42,12 38,20 Q35,26 26,30 L28,28 Q34,22 35,16 Q30,22 24,28 L22,32 Q16,36 12,38 Q14,34 18,30 Q22,26 28,24 Q20,26 14,32 L16,28 Q20,22 26,18 Q20,22 16,26 L18,22 Q24,16 32,12 Q30,14 28,18 Q32,12 36,5Z" fill="#E91E63" opacity="0.85"/>
  <!-- Center quill line -->
  <line x1="36" y1="6" x2="12" y2="38" stroke="#F48FB1" stroke-width="1" opacity="0.6"/>

  <!-- Binary data packets (Avro = binary format) -->
  <rect x="4" y="10" width="5" height="3" rx="0.5" fill="#5C6BC0" opacity="0.7"/>
  <rect x="4" y="15" width="3" height="3" rx="0.5" fill="#5C6BC0" opacity="0.7"/>
  <rect x="4" y="20" width="5" height="3" rx="0.5" fill="#5C6BC0" opacity="0.7"/>

  <!-- Transform arrow -->
  <line x1="10" y1="36" x2="16" y2="36" stroke="#FF6D00" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="14,33 17,36 14,39" stroke="#FF6D00" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Schema box (output) -->
  <rect x="18" y="31" width="14" height="11" rx="2" fill="#EEF2FA" stroke="#E91E63" stroke-width="1"/>
  <text x="25" y="38" font-size="5" font-family="monospace" fill="#E91E63" text-anchor="middle">AVRO</text>

  <text x="24" y="47" font-size="4" font-family="sans-serif" fill="#5A6082" text-anchor="middle">AVRO TRANSFORM</text>
</svg>
