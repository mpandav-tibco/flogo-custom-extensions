<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- JSON doc on left: { } brackets -->
  <rect x="4" y="8" width="16" height="20" rx="2" fill="#EEF2FA" stroke="#F29111" stroke-width="1.2"/>
  <text x="6" y="16" font-size="7" font-family="monospace" fill="#F29111">{</text>
  <text x="8" y="21" font-size="4.5" font-family="monospace" fill="#5A6082">k:v</text>
  <text x="6" y="26" font-size="7" font-family="monospace" fill="#F29111">}</text>
  <polyline points="16,8 20,8 20,12 16,12 16,8" fill="#FFFFFF" stroke="#F29111" stroke-width="1"/>

  <!-- Gear/transform icon in middle -->
  <circle cx="24" cy="18" r="4" fill="#FFFFFF" stroke="#FF6D00" stroke-width="1.5"/>
  <circle cx="24" cy="18" r="1.8" fill="#FF6D00"/>
  <!-- Gear teeth -->
  <rect x="23" y="12" width="2" height="3" rx="0.5" fill="#FF6D00"/>
  <rect x="23" y="21" width="2" height="3" rx="0.5" fill="#FF6D00"/>
  <rect x="18" y="17" width="3" height="2" rx="0.5" fill="#FF6D00"/>
  <rect x="27" y="17" width="3" height="2" rx="0.5" fill="#FF6D00"/>

  <!-- Transform arrow -->
  <line x1="28" y1="18" x2="31" y2="18" stroke="#FF6D00" stroke-width="1.5" stroke-linecap="round"/>
  <polyline points="29,15 32,18 29,21" stroke="#FF6D00" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Output JSON doc on right -->
  <rect x="32" y="8" width="14" height="20" rx="2" fill="#EEF2FA" stroke="#7C4DFF" stroke-width="1.2"/>
  <text x="33" y="15" font-size="7" font-family="monospace" fill="#7C4DFF">{</text>
  <text x="35" y="20" font-size="4" font-family="monospace" fill="#5A6082">k'</text>
  <text x="33" y="26" font-size="7" font-family="monospace" fill="#7C4DFF">}</text>

  <!-- Validation check -->
  <circle cx="12" cy="36" r="5" fill="#FFFFFF" stroke="#2A8040" stroke-width="1.5"/>
  <polyline points="9,36 11,38 15,33" stroke="#2A8040" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="24" y="47" font-size="4" font-family="sans-serif" fill="#5A6082" text-anchor="middle">JSON TRANSFORM</text>
</svg>
