<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Log document -->
  <rect x="8" y="6" width="26" height="32" rx="3" fill="#EEF2FA" stroke="#5C6BC0" stroke-width="1.2"/>
  <!-- Corner fold -->
  <polygon points="28,6 34,6 34,12 28,12" fill="#FFFFFF"/>
  <polyline points="28,6 28,12 34,12" stroke="#5C6BC0" stroke-width="1.2" fill="none"/>
  <!-- Log lines with level prefixes -->
  <rect x="11" y="14" width="5" height="3.5" rx="1" fill="#2A8040" opacity="0.9"/>
  <text x="12" y="17" font-size="3.5" font-family="monospace" fill="#FFFFFF">INF</text>
  <line x1="18" y1="15.5" x2="30" y2="15.5" stroke="#5C6BC0" stroke-width="1" stroke-linecap="round"/>

  <rect x="11" y="20" width="5" height="3.5" rx="1" fill="#F29111" opacity="0.9"/>
  <text x="11.5" y="23" font-size="3.5" font-family="monospace" fill="#FFFFFF">WRN</text>
  <line x1="18" y1="21.5" x2="28" y2="21.5" stroke="#5C6BC0" stroke-width="1" stroke-linecap="round"/>
  <line x1="18" y1="24" x2="26" y2="24" stroke="#5C6BC0" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <rect x="11" y="26" width="5" height="3.5" rx="1" fill="#E53935" opacity="0.9"/>
  <text x="11.5" y="29" font-size="3.5" font-family="monospace" fill="#FFFFFF">ERR</text>
  <line x1="18" y1="27.5" x2="30" y2="27.5" stroke="#5C6BC0" stroke-width="1" stroke-linecap="round"/>

  <line x1="11" y1="33" x2="30" y2="33" stroke="#5C6BC0" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.4"/>

  <!-- Pencil writing icon -->
  <rect x="32" y="30" width="5" height="12" rx="1.5" transform="rotate(-45 34.5 36)" fill="#FF6D00"/>
  <polygon points="29,42 32,39 35,42" fill="#FFD180"/>
  <line x1="32" y1="28" x2="34" y2="30" stroke="#FFAB40" stroke-width="1"/>

  <text x="21" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">WRITE LOG</text>
</svg>
