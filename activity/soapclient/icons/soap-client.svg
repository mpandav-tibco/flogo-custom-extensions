<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Background -->
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- XML left bracket < (chevron shape) -->
  <polyline points="13,9 5,20 13,31" stroke="#5C6BC0" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- XML right bracket > (chevron shape) -->
  <polyline points="29,9 37,20 29,31" stroke="#5C6BC0" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Slash / -->
  <line x1="26" y1="9" x2="16" y2="31" stroke="#7C4DFF" stroke-width="2.2" stroke-linecap="round"/>

  <!-- WSDL document icon (top-right) -->
  <rect x="36" y="3" width="10" height="13" rx="1.5" fill="#E8EAF6" stroke="#7C4DFF" stroke-width="1"/>
  <polyline points="43,3 43,7 47,7" stroke="#7C4DFF" stroke-width="0.8" fill="none" stroke-linejoin="round"/>
  <line x1="38" y1="9" x2="44" y2="9" stroke="#9575CD" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="38" y1="11" x2="44" y2="11" stroke="#9575CD" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="38" y1="13" x2="42" y2="13" stroke="#9575CD" stroke-width="0.9" stroke-linecap="round"/>

  <!-- Service call arrow -->
  <line x1="6" y1="39" x2="31" y2="39" stroke="#43A047" stroke-width="2" stroke-linecap="round"/>
  <polygon points="28,36.5 33,39 28,41.5" fill="#43A047"/>

  <!-- SOAP label -->
  <text x="22" y="47.5" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5C6BC0" font-weight="bold">SOAP</text>
</svg>
