<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- XML angle brackets (input) on left -->
  <text x="4" y="22" font-size="14" font-family="monospace" fill="#F29111" dominant-baseline="middle">&lt;</text>
  <text x="9" y="17" font-size="5" font-family="monospace" fill="#F29111">tag</text>
  <text x="9" y="23" font-size="4" font-family="monospace" fill="#5C6BC0">attr</text>
  <text x="4" y="29" font-size="14" font-family="monospace" fill="#F29111" dominant-baseline="middle">/&gt;</text>

  <!-- Filter funnel in center -->
  <polygon points="20,8 36,8 31,16 25,16" fill="#7C4DFF" opacity="0.9"/>
  <rect x="25" y="16" width="6" height="5" fill="#7C4DFF" opacity="0.9"/>
  <rect x="26.5" y="21" width="3" height="5" rx="1" fill="#7C4DFF" opacity="0.9"/>

  <!-- XPath / filter expression -->
  <rect x="19" y="28" width="17" height="8" rx="2" fill="#EEF2FA" stroke="#7C4DFF" stroke-width="0.8"/>
  <text x="21" y="33" font-size="4" font-family="monospace" fill="#7C4DFF">/root</text>
  <text x="21" y="37" font-size="3.5" font-family="monospace" fill="#5A6082">[@id]</text>

  <!-- Filtered output (only some elements pass) -->
  <text x="37" y="20" font-size="10" font-family="monospace" fill="#2A8040" dominant-baseline="middle">✓</text>
  <line x1="36" y1="24" x2="44" y2="24" stroke="#2A8040" stroke-width="1.5" stroke-linecap="round"/>
  <text x="37" y="32" font-size="10" font-family="monospace" fill="#E53935" dominant-baseline="middle">✗</text>

  <text x="24" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">XML FILTER</text>
</svg>
