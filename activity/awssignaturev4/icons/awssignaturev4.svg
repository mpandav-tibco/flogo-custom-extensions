<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- AWS cloud shape -->
  <path d="M10,26 Q8,26 8,23 Q8,19 12,19 Q12,14 17,13 Q19,9 24,9 Q29,9 31,13 Q36,13 37,18 Q40,18 40,22 Q40,26 37,26Z" fill="#FFF0D0" stroke="#FF9900" stroke-width="1.3"/>
  <!-- AWS orange highlight on cloud -->
  <path d="M14,26 Q12,26 12,23.5 Q12,21 15,21 Q15,17 19,16 Q21,13 25,13 Q29,13 30.5,16 Q34,16 35,20 Q37,20 37,23 Q37,26 34,26Z" fill="#FFEACC" stroke="#FF9900" stroke-width="0"/>

  <!-- Lock body in center of cloud -->
  <rect x="19" y="22" width="10" height="8" rx="1.5" fill="#FF9900"/>
  <!-- Lock shackle -->
  <path d="M21,22 L21,19 Q21,16 24,16 Q27,16 27,19 L27,22" stroke="#FF9900" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="24" cy="26" r="1.5" fill="#7A3B00"/>
  <rect x="23.2" y="26" width="1.6" height="2.5" fill="#7A3B00"/>

  <!-- HMAC signature waves underneath cloud -->
  <path d="M8,32 Q11,29 14,32 Q17,35 20,32" stroke="#FF9900" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M22,32 Q25,29 28,32 Q31,35 34,32" stroke="#FF9900" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M36,32 Q39,29 42,32" stroke="#FF9900" stroke-width="1.4" fill="none" stroke-linecap="round"/>

  <!-- "V4" label -->
  <text x="40" y="12" font-size="7" font-family="monospace" fill="#FF9900" text-anchor="middle" font-weight="bold">V4</text>

  <text x="24" y="47" font-size="4.5" font-family="sans-serif" fill="#5A6082" text-anchor="middle">AWS SIG V4</text>
</svg>
