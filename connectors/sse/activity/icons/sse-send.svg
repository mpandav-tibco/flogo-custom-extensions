<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Event envelope / message bubble -->
  <rect x="4" y="14" width="22" height="16" rx="3" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <!-- Event lines inside bubble -->
  <line x1="8" y1="19" x2="22" y2="19" stroke="#5C6BC0" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="23" x2="22" y2="23" stroke="#7C4DFF" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="27" x2="17" y2="27" stroke="#5C6BC0" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <!-- Send arrow -->
  <line x1="27" y1="22" x2="34" y2="22" stroke="#7C4DFF" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="32,18.5 38,22 32,25.5" fill="#7C4DFF"/>
  <!-- Client receivers (stacked dots) -->
  <circle cx="42" cy="14" r="3" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <circle cx="42" cy="22" r="3" fill="#E8EAF6" stroke="#7C4DFF" stroke-width="1.5"/>
  <circle cx="42" cy="30" r="3" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <!-- Dashed delivery lines from arrowhead to each client -->
  <line x1="38" y1="16" x2="39" y2="14" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="2,1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="38" y1="28" x2="39" y2="30" stroke="#5C6BC0" stroke-width="1" stroke-dasharray="2,1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Label -->
  <text x="24" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" font-weight="bold" fill="#5C6BC0">SSE SEND</text>
</svg>
