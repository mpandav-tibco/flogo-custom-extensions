<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Server body (small, bottom-left) -->
  <rect x="4" y="30" width="16" height="9" rx="2" fill="#5C6BC0"/>
  <circle cx="17" cy="34.5" r="1.5" fill="#E8EAF6"/>
  <line x1="7" y1="34.5" x2="14" y2="34.5" stroke="#E8EAF6" stroke-width="1" stroke-linecap="round"/>
  <!-- Connection incoming arrow (client subscribing) -->
  <line x1="22" y1="34.5" x2="27" y2="34.5" stroke="#7C4DFF" stroke-width="1.5" stroke-dasharray="2,1.5" stroke-linecap="round"/>
  <polygon points="26,32 30,34.5 26,37" fill="#7C4DFF"/>
  <!-- SSE stream lines outgoing from server upward-right -->
  <path d="M12 30 Q12 16 24 16" fill="none" stroke="#5C6BC0" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M12 30 Q14 18 28 14" fill="none" stroke="#7C4DFF" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <!-- Client nodes (receiving) -->
  <circle cx="34" cy="10" r="4" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <circle cx="43" cy="20" r="3.5" fill="#E8EAF6" stroke="#5C6BC0" stroke-width="1.5"/>
  <circle cx="40" cy="32" r="3.5" fill="#E8EAF6" stroke="#7C4DFF" stroke-width="1.5"/>
  <!-- Arrows from stream lines to clients -->
  <line x1="28" y1="15" x2="31" y2="12" stroke="#5C6BC0" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="30" y1="20" x2="40" y2="21" stroke="#7C4DFF" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" font-weight="bold" fill="#5C6BC0">SSE TRIGGER</text>
</svg>
