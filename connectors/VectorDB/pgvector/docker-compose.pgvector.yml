services:
  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: vectordb_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d vectordb_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data:
