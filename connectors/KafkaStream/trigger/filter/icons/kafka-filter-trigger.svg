<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Kafka bolt (top-left, Kafka consumer) -->
  <polyline points="8,6 5,14 9,14 6,22" stroke="#FF6D00" stroke-width="1.8" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Stream messages entering from left -->
  <line x1="10" y1="11" x2="15" y2="11" stroke="#5C6BC0" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="16" x2="15" y2="16" stroke="#5C6BC0" stroke-width="1.2" stroke-dasharray="2,2" stroke-linecap="round"/>
  <line x1="10" y1="21" x2="15" y2="21" stroke="#5C6BC0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Funnel body -->
  <polygon points="15,8 37,8 30,18 22,18" fill="#7C4DFF" opacity="0.9"/>
  <!-- Funnel neck -->
  <rect x="22" y="18" width="8" height="6" fill="#7C4DFF" opacity="0.9"/>
  <!-- Funnel spout -->
  <rect x="25" y="24" width="2" height="5" rx="1" fill="#7C4DFF"/>
  <!-- Non-matching blocked X (upper-right of funnel) -->
  <line x1="32" y1="10" x2="36" y2="14" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="10" x2="32" y2="14" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Matched output: green circle with checkmark (flow fires) -->
  <circle cx="30" cy="35" r="4" fill="#43A047"/>
  <polyline points="28,35 29.8,37 33,32.5" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flow trigger arrow -->
  <line x1="34" y1="35" x2="41" y2="35" stroke="#43A047" stroke-width="2" stroke-linecap="round"/>
  <polygon points="39,32.5 43,35 39,37.5" fill="#43A047"/>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5C6BC0">FILTER</text>
</svg>
