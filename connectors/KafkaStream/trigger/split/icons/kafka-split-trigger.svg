<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Dark background -->
  <rect width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Input stream from left -->
  <line x1="4" y1="24" x2="16" y2="24" stroke="#7C4DFF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Kafka lightning bolt at split point -->
  <polyline points="16,19 14,24 18,24 16,29" stroke="#FF6D00" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Split node -->
  <circle cx="21" cy="24" r="3" fill="#7C4DFF"/>

  <!-- Route A: curves up to top-right -->
  <path d="M21,24 Q28,24 32,16" stroke="#5C6BC0" stroke-width="2" fill="none" stroke-linecap="round"/>
  <line x1="32" y1="16" x2="44" y2="16" stroke="#5C6BC0" stroke-width="2" stroke-linecap="round"/>
  <!-- Route A label -->
  <rect x="34" y="10" width="9" height="5" rx="1" fill="#5C6BC0" opacity="0.2"/>
  <text x="38.5" y="14" font-size="4" font-family="monospace" fill="#5C6BC0" text-anchor="middle">A</text>

  <!-- Route B: goes straight -->
  <line x1="24" y1="24" x2="44" y2="24" stroke="#7C4DFF" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3,2"/>
  <rect x="34" y="20" width="9" height="5" rx="1" fill="#7C4DFF" opacity="0.2"/>
  <text x="38.5" y="24" font-size="4" font-family="monospace" fill="#7C4DFF" text-anchor="middle" dominant-baseline="middle">B</text>

  <!-- Route C: curves down to bottom-right -->
  <path d="M21,24 Q28,24 32,32" stroke="#FF6D00" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <line x1="32" y1="32" x2="44" y2="32" stroke="#FF6D00" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Route C label -->
  <rect x="34" y="28" width="9" height="5" rx="1" fill="#FF6D00" opacity="0.2"/>
  <text x="38.5" y="32" font-size="4" font-family="monospace" fill="#FF6D00" text-anchor="middle" dominant-baseline="middle">C</text>

  <!-- Label -->
  <text x="24" y="48" font-size="5" font-family="sans-serif" fill="#5A6082" text-anchor="middle" dominant-baseline="auto">SPLIT</text>
</svg>
