<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Input stream from left (single Kafka message) -->
  <line x1="4" y1="24" x2="17" y2="24" stroke="#7C4DFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Kafka bolt at split decision point -->
  <polyline points="17,19 14,24 19,24 16,29" stroke="#FF6D00" stroke-width="2.2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Split node circle -->
  <circle cx="22" cy="24" r="3.5" fill="#7C4DFF"/>
  <!-- Route A: curves up to top-right output -->
  <path d="M22,24 Q29,24 33,15" fill="none" stroke="#5C6BC0" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="15" x2="43" y2="15" stroke="#5C6BC0" stroke-width="2" stroke-linecap="round"/>
  <rect x="37" y="10" width="8" height="6" rx="1.5" fill="#5C6BC0" opacity="0.15" stroke="#5C6BC0" stroke-width="1"/>
  <text x="41" y="14" font-size="5" font-family="monospace" fill="#5C6BC0" text-anchor="middle">A</text>
  <!-- Route B: straight middle (dashed = default/fallthrough) -->
  <line x1="25.5" y1="24" x2="43" y2="24" stroke="#7C4DFF" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round"/>
  <rect x="37" y="20" width="8" height="6" rx="1.5" fill="#7C4DFF" opacity="0.15" stroke="#7C4DFF" stroke-width="1"/>
  <text x="41" y="24" font-size="5" font-family="monospace" fill="#7C4DFF" text-anchor="middle" dominant-baseline="middle">B</text>
  <!-- Route C: curves down to bottom-right output -->
  <path d="M22,24 Q29,24 33,33" fill="none" stroke="#FF6D00" stroke-width="2" stroke-linecap="round"/>
  <line x1="33" y1="33" x2="43" y2="33" stroke="#FF6D00" stroke-width="2" stroke-linecap="round"/>
  <rect x="37" y="29" width="8" height="6" rx="1.5" fill="#FF6D00" opacity="0.12" stroke="#FF6D00" stroke-width="1"/>
  <text x="41" y="33" font-size="5" font-family="monospace" fill="#FF6D00" text-anchor="middle" dominant-baseline="middle">C</text>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5C6BC0">SPLIT</text>
</svg>
