<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Incoming message dots (left, representing stream events) -->
  <circle cx="5" cy="14" r="2" fill="#7C4DFF"/>
  <circle cx="5" cy="21" r="2" fill="#7C4DFF"/>
  <circle cx="5" cy="28" r="2" fill="#7C4DFF" opacity="0.5"/>
  <!-- Funnel top trapezoid -->
  <polygon points="11,9 37,9 30,19 18,19" fill="#7C4DFF" opacity="0.85"/>
  <!-- Funnel neck -->
  <rect x="19" y="19" width="10" height="7" fill="#7C4DFF" opacity="0.85"/>
  <!-- Funnel spout -->
  <rect x="22" y="26" width="4" height="6" rx="1" fill="#7C4DFF"/>
  <!-- Passed message: green circle with checkmark (predicate matched) -->
  <circle cx="24" cy="39" r="3.5" fill="#43A047"/>
  <polyline points="22.3,39 23.8,40.8 26.8,37.2" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Blocked indicator X (upper-right of funnel, rejected event) -->
  <line x1="32" y1="11" x2="36" y2="15" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="11" x2="32" y2="15" stroke="#EF5350" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5.5" fill="#5C6BC0">FILTER</text>
</svg>
