<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <rect x="0" y="0" width="48" height="48" rx="10" ry="10" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Window bracket at top (open rectangle = time/count window) -->
  <path d="M6,11 L6,7 L38,7 L38,11" fill="none" stroke="#5C6BC0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- 4 accumulating bars growing in height (left to right) -->
  <rect x="7"  y="30" width="6" height="8"  rx="1" fill="#5C6BC0" opacity="0.6"/>
  <rect x="15" y="24" width="6" height="14" rx="1" fill="#7C4DFF" opacity="0.75"/>
  <rect x="23" y="17" width="6" height="21" rx="1" fill="#7C4DFF"/>
  <rect x="31" y="22" width="6" height="16" rx="1" fill="#5C6BC0"/>
  <!-- Baseline -->
  <line x1="5" y1="38" x2="40" y2="38" stroke="#546E7A" stroke-width="1.2"/>
  <!-- Sigma (aggregate function symbol, top-right corner) -->
  <text x="44" y="14" font-size="11" font-family="serif" fill="#FF6D00" text-anchor="middle" dominant-baseline="auto">Σ</text>
  <!-- Label -->
  <text x="24" y="47" text-anchor="middle" font-family="Arial,sans-serif" font-size="5" fill="#5C6BC0">AGGREGATE</text>
</svg>
